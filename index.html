<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Android Prep — Kagemora</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-clike.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-kotlin.min.js"></script>
</head>
<body>
  <div class="titlebar">
    <div class="dots">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
    </div>
    <div class="path">android-prep — <b>~/interview-notes</b></div>
  </div>

  <div class="workspace">
    <aside class="sidebar">
      <div class="sidebar-title">Project</div>
      <div id="sidebar-tree"></div>
      <div class="sidebar-footer">
        <div class="overall-label">
          <span>Общий прогресс</span>
          <span id="overall-label"></span>
        </div>
        <div class="overall-bar"><div class="overall-bar-fill" id="overall-fill"></div></div>
      </div>
    </aside>

    <main class="main">
      <div class="tabs" id="tabs"></div>
      <div class="searchbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="search-input" type="text" placeholder="Поиск по вопросам…" />
        </div>
      </div>
      <div class="content" id="content"></div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
